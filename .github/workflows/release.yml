name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # actions/setup-go v5.5.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare metadata
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          major="${version%%.*}"
          major_minor="$(printf '%s\n' "$version" | awk -F. '{print $1 "." $2}')"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "version=$version"
            echo "major=$major"
            echo "major_minor=$major_minor"
            echo "build_date=$build_date"
          } >> "$GITHUB_OUTPUT"

      - name: Build archives
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
        run: |
          set -euo pipefail
          mkdir -p dist work
          ldflags="-s -w -buildid= -X github.com/isyuricunha/discord-news-rss-bot/internal/version.Version=$VERSION -X github.com/isyuricunha/discord-news-rss-bot/internal/version.Commit=$GITHUB_SHA -X github.com/isyuricunha/discord-news-rss-bot/internal/version.Date=$BUILD_DATE"

          build_unix() {
            os="$1"
            arch="$2"
            name="discord-rss-bot-${VERSION}-${os}-${arch}"
            mkdir -p "work/$name"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="$ldflags" -o "work/$name/discord-rss-bot" ./cmd/discord-rss-bot
            cp README.md LICENSE MIGRATION.md CHANGELOG.md "work/$name/"
            tar -C work -czf "dist/$name.tar.gz" "$name"
          }

          build_windows() {
            name="discord-rss-bot-${VERSION}-windows-amd64"
            mkdir -p "work/$name"
            CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="$ldflags" -o "work/$name/discord-rss-bot.exe" ./cmd/discord-rss-bot
            cp README.md LICENSE MIGRATION.md CHANGELOG.md "work/$name/"
            (cd work && zip -qr "../dist/$name.zip" "$name")
          }

          build_unix linux amd64
          build_unix linux arm64
          build_windows
          (cd dist && sha256sum * > checksums.txt)

      # docker/setup-qemu-action v4.1.0
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      # docker/setup-buildx-action v4.1.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      # docker/login-action v3.4.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect Docker Hub credentials
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        # docker/login-action v3.4.0
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish GHCR image
        # docker/build-push-action v7.2.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.major_minor }}
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.major }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.title=Discord RSS Bot
            org.opencontainers.image.description=RSS and Atom feed monitor for Discord webhooks
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Publish Docker Hub image
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        # docker/build-push-action v7.2.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/discord-rss-bot:${{ steps.meta.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/discord-rss-bot:${{ steps.meta.outputs.major_minor }}
            ${{ secrets.DOCKERHUB_USERNAME }}/discord-rss-bot:${{ steps.meta.outputs.major }}
            ${{ secrets.DOCKERHUB_USERNAME }}/discord-rss-bot:latest
          labels: |
            org.opencontainers.image.title=Discord RSS Bot
            org.opencontainers.image.description=RSS and Atom feed monitor for Discord webhooks
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Create GitHub release
        # softprops/action-gh-release v3.0.1
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
