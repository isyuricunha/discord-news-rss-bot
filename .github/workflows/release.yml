name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-go v5.5.0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare metadata
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          major="${version%%.*}"
          major_minor="$(printf '%s\n' "$version" | awk -F. '{print $1 "." $2}')"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "version=$version"
            echo "major=$major"
            echo "major_minor=$major_minor"
            echo "build_date=$build_date"
          } >> "$GITHUB_OUTPUT"

      - name: Build archives
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
        run: |
          set -euo pipefail
          mkdir -p dist work
          ldflags="-s -w -buildid= -X github.com/isyuricunha/discord-news-rss-bot/internal/version.Version=$VERSION -X github.com/isyuricunha/discord-news-rss-bot/internal/version.Commit=$GITHUB_SHA -X github.com/isyuricunha/discord-news-rss-bot/internal/version.Date=$BUILD_DATE"

          build_unix() {
            os="$1"
            arch="$2"
            name="discord-rss-bot-${VERSION}-${os}-${arch}"
            mkdir -p "work/$name"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="$ldflags" -o "work/$name/discord-rss-bot" ./cmd/discord-rss-bot
            cp README.md LICENSE MIGRATION.md CHANGELOG.md "work/$name/"
            tar -C work -czf "dist/$name.tar.gz" "$name"
          }

          build_windows() {
            name="discord-rss-bot-${VERSION}-windows-amd64"
            mkdir -p "work/$name"
            CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="$ldflags" -o "work/$name/discord-rss-bot.exe" ./cmd/discord-rss-bot
            cp README.md LICENSE MIGRATION.md CHANGELOG.md "work/$name/"
            (cd work && zip -qr "../dist/$name.zip" "$name")
          }

          build_unix linux amd64
          build_unix linux arm64
          build_windows
          (cd dist && sha256sum * > checksums.txt)

      # docker/setup-qemu-action v3.6.0
      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392

      # docker/setup-buildx-action v3.10.0
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2

      # docker/login-action v3.4.0
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect Docker Hub credentials
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        # docker/login-action v3.4.0
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish GHCR image
        # docker/build-push-action v6.18.0
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.major_minor }}
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.major }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.title=Discord RSS Bot
            org.opencontainers.image.description=RSS and Atom feed monitor for Discord webhooks
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Publish Docker Hub image
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        # docker/build-push-action v6.18.0
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/discord-rss-bot:${{ steps.meta.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/discord-rss-bot:${{ steps.meta.outputs.major_minor }}
            ${{ secrets.DOCKERHUB_USERNAME }}/discord-rss-bot:${{ steps.meta.outputs.major }}
            ${{ secrets.DOCKERHUB_USERNAME }}/discord-rss-bot:latest
          labels: |
            org.opencontainers.image.title=Discord RSS Bot
            org.opencontainers.image.description=RSS and Atom feed monitor for Discord webhooks
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Create GitHub release
        # softprops/action-gh-release v2.3.2
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
